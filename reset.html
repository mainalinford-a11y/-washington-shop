<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Washington Shop</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card glass fade-in">
            <h1>Reset Password</h1>
            <p>Enter the reset token you received and choose a new password.</p>

            <form id="reset-form">
                <div class="form-group">
                    <label>Reset Token</label>
                    <input type="text" id="token" required placeholder="token">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newpass" required placeholder="new password">
                </div>
                <button type="submit" class="btn btn-primary w-full">Set New Password</button>
            </form>

            <a href="login.html" class="back-home">← Back to Sign In</a>
        </div>
    </div>

    <script type="module">
        import { resetPassword } from './src/api.js';

        const form = document.getElementById('reset-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'Resetting...';
            const token = document.getElementById('token').value.trim();
            const newpass = document.getElementById('newpass').value;
            try {
                await resetPassword(token, newpass);
                alert('Password updated successfully. You can now sign in with the new password.');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message || 'Error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Set New Password';
            }
        });
    </script>
</body>
</html>

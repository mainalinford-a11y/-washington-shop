<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Washington Shop</title>
    <link rel="stylesheet" href="./src/style.css">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 50px;
        }
        .login-card h1 {
            margin-bottom: 10px;
            text-align: center;
        }
        .login-card p {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-home:hover {
            color: var(--accent-gold);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card glass fade-in">
            <h1>Admin Login</h1>
            <p>Access the Washington Control Panel</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>
            
            <a href="index.html" class="back-home">← Back to Shop</a>
        </div>
    </div>

    <script type="module">
        import { login, checkAuth } from './src/api.js';

        // Redirect if already logged in
        if (checkAuth()) {
            window.location.href = 'admin.html';
        }

        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = loginForm.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Verifying...';

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                await login(user, pass);
                window.location.href = 'admin.html';
            } catch (error) {
                alert(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Sign In';
            }
        });
    </script>
</body>
</html>
